services:
  postgres:
    image: postgres:15-alpine
    container_name: lexiassist-postgres
    environment:
      POSTGRES_USER: lexiassist
      POSTGRES_PASSWORD: lexiassist_secret
      POSTGRES_DB: lexiassist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexiassist"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lexiassist-network

  redis:
    image: redis:7-alpine
    container_name: lexiassist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lexiassist-network

  user-service:
    build:
      context: ..
      dockerfile: Dockerfile.user-service
    container_name: lexiassist-user-service
    environment:
      - SERVICE_NAME=user-service
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - PORT=8081
      - DATABASE_URL=postgres://lexiassist:lexiassist_secret@postgres:5432/lexiassist?sslmode=disable
      - REDIS_URL=redis:6379
      - PRIVATE_KEY_ENCRYPTION_KEY=your-secure-master-key-min-32-chars-long-1234
      - BCRYPT_COST=12
      - ACCESS_TOKEN_TTL=15m
      - REFRESH_TOKEN_TTL=720h
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lexiassist-network
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: lexiassist-gateway
    environment:
      - SERVICE_NAME=gateway
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - PORT=8080
      - REDIS_URL=redis:6379
      - RATE_LIMIT_RPM=100
      - AI_RATE_LIMIT_RPM=20
      - CIRCUIT_BREAKER_THRESHOLD=3
      - CIRCUIT_BREAKER_TIMEOUT=60s
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
      - USER_SERVICE_URL=http://user-service:8081
      - CONTENT_SERVICE_URL=http://content-service:8082
      - ANALYTICS_SERVICE_URL=http://analytics-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8084
      - SYNC_SERVICE_URL=http://sync-service:8085
      - AI_ORCHESTRATOR_URL=http://ai-orchestrator:5000
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - redis
    networks:
      - lexiassist-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  lexiassist-network:
    driver: bridge
